  # --- 1. ORIGINAL SOC SENSOR (WICHTIG: ID BEIBEHALTEN) ---
  - platform: template
    name: "BMS SOC Prozent"
    id: bms_soc_final
    unit_of_measurement: "%"
    accuracy_decimals: 0
    lambda: |-
      if (id(bms_ah).has_state() && id(bms_nom_cap).has_state() && id(bms_nom_cap).state > 0) {
        return (id(bms_ah).state / id(bms_nom_cap).state) * 100.0;
      }
      return {};
    update_interval: 10s

  # --- 2. ZUSÄTZLICHER SPANNUNGS-SOC (NEUE ID) ---
  - platform: template
    name: "BMS SOC (Spannung)"
    id: bms_soc_voltage
    unit_of_measurement: "%"
    accuracy_decimals: 0
    lambda: |-
      if (id(bms_v).has_state()) {
          float v = id(bms_v).state;
          float min_v = id(conf_v_min).state;
          float max_v = id(conf_v_max).state;
          
          if (max_v <= min_v) return 0.0;
          
          float calc = (v - min_v) / (max_v - min_v) * 100.0f;
          if (calc < 0) calc = 0;
          if (calc > 100) calc = 100;
          return calc;
      }
      return {};
    update_interval: 5s
    
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    entity_category: diagnostic

# --- BINARY SENSOR ---
binary_sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: bms0
    charging: { name: "BMS Laden Status" }
    discharging: { name: "BMS Entladen Status" }
    balancing: { name: "BMS Balancing aktiv", id: bms_bal_aktiv }
    # Online Status war im original nicht drin, wenn du ihn willst, einkommentieren:
    # online_status: { name: "BMS Online" }

  - platform: gpio
    pin: {number: 41, inverted: true, mode: {input: true, pullup: true}}
    name: "Atom S3 Knopf"
    internal: true 
    on_multi_click:
      # 1. Doppelklick
      - timing:
          - ON for 2ms to 400ms
          - OFF for 2ms to 400ms
          - ON for 2ms to 400ms
        then:
          - script.execute:
              id: execute_button_action
              selection: !lambda 'return id(btn_action_double).current_option();'
              
      # 2. Einzelklick
      - timing:
          - ON for 2ms to 400ms
          - OFF for at least 401ms
        then:
          - script.execute:
              id: execute_button_action
              selection: !lambda 'return id(btn_action_single).current_option();'
              
      # 3. Lang drücken
      - timing:
          - ON for at least 800ms
        then:
          - script.execute:
              id: execute_button_action
              selection: !lambda 'return id(btn_action_long).current_option();'

text_sensor:
  - platform: jk_bms_ble
    jk_bms_ble_id: bms0
    errors: { name: "BMS Fehler" }
    hardware_version: { id: bms_hw_raw, internal: true }
    software_version: { id: bms_sw_raw, internal: true }

  - platform: template
    name: "BMS Hardware Version"
    icon: "mdi:chip"
    entity_category: diagnostic
    lambda: |-
      if (id(bms_hw_raw).has_state()) {
        std::string raw = id(bms_hw_raw).state;
        std::string clean = "";
        for (char c : raw) { if (c >= 32 && c <= 126) clean += c; }
        return clean;
      }
      return {};
    update_interval: 60s

  - platform: template
    name: "BMS Software Version"
    icon: "mdi:file-code"
    entity_category: diagnostic
    lambda: |-
      if (id(bms_sw_raw).has_state()) {
        std::string raw = id(bms_sw_raw).state;
        std::string clean = "";
        for (char c : raw) { if (c >= 32 && c <= 126) clean += c; }
        return clean;
      }
      return {};
    update_interval: 60s
    
spi:
  clk_pin: 17
  mosi_pin: 21

font:
  - file: "gfonts://Roboto"
    id: font_huge
    size: 42 
    glyphs: '0123456789%-.Wnak ' # k ist drin!
  - file: "gfonts://Roboto"
    id: font_large
    size: 28
    glyphs: '0123456789.VA- JKTOLE'
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
    glyphs: '0123456789.:% -ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz°<>'

display:
  - platform: st7789v
    id: lcd_display
    model: Custom
    height: 128
    width: 128
    offset_height: 2
    offset_width: 1
    cs_pin: 15
    dc_pin: 33
    reset_pin: 34
    rotation: 0
    update_interval: 50ms
    pages:
      # --- PAGE SETUP ---
      - id: page_setup
        lambda: |-
          it.fill(Color(0,0,0));
          if (id(show_border)) it.rectangle(0,0,128,128,Color(0,0,255));
          it.print(64, 5, id(font_small), Color(255, 50, 50), TextAlign::TOP_CENTER, "SETUP MODE");
          it.qr_code(20, 25, id(wifi_qr), Color(255, 255, 255), 3);
          it.print(64, 115, id(font_small), Color(200, 200, 200), TextAlign::CENTER, "Scan to Connect");

      # --- PAGE BOOT ---
      - id: page_boot
        lambda: |-
          it.fill(Color(0, 0, 0));
          if (id(show_border)) {
            it.rectangle(0, 0, 128, 128, Color(0, 0, 255));
            it.rectangle(1, 1, 126, 126, Color(0, 0, 255));
          }
          if (id(api_server).is_connected()) it.filled_circle(115, 6, 2, Color(100, 255, 100));
          if (id(bms_ble_client).connected()) it.filled_circle(124, 6, 2, Color(0, 100, 255));

          int h = 16;             
          int w_rect = 100;       
          int r = h / 2;          
          int x = 64 - (w_rect / 2); 
          int y = 56;             

          it.filled_circle(x, y + r, r, Color(50, 50, 50));
          it.filled_circle(x + w_rect, y + r, r, Color(50, 50, 50));
          it.filled_rectangle(x, y, w_rect, h + 1, Color(50, 50, 50));

          float progress = clamp((float)millis() / 15000.0f, 0.0f, 1.0f);
          int current_w = (int)(progress * (float)w_rect);

          if (current_w >= 0) {
            it.filled_circle(x, y + r, r, Color(0, 120, 255));
            it.filled_rectangle(x, y, current_w, h + 1, Color(0, 120, 255));
            it.filled_circle(x + current_w, y + r, r, Color(0, 120, 255));
          }
          it.print(64, 115, id(font_small), Color(200, 200, 200), TextAlign::CENTER, "SYSTEM START...");

      # --- PAGE 1 (BATTERIE) ---
      - id: page1
        lambda: |-
          it.fill(Color(0, 0, 0));
          if (id(show_border)) { it.rectangle(0, 0, 128, 128, Color(0, 0, 255)); it.rectangle(1, 1, 126, 126, Color(0, 0, 255)); }
          if (id(api_server).is_connected()) it.filled_circle(115, 6, 2, Color(100, 255, 100));
          if (id(bms_ble_client).connected()) it.filled_circle(124, 6, 2, Color(0, 100, 255));

          if (id(conf_lang).current_option() == "Deutsch") {
            it.print(2, 2, id(font_small), Color(80, 80, 80), TextAlign::TOP_LEFT, "BATTERIE");
          } else {
            it.print(2, 2, id(font_small), Color(80, 80, 80), TextAlign::TOP_LEFT, "BATTERY");
          }
          
          // DISPLAY LOGIK: WELCHEN SOC ANZEIGEN?
          float soc = 0.0;
          if (id(conf_soc_source).current_option() == "Spannung Kalkuliert") {
             if (id(bms_soc_voltage).has_state()) soc = id(bms_soc_voltage).state;
          } else {
             if (id(bms_soc_final).has_state()) soc = id(bms_soc_final).state;
          }
          
          if (std::isnan(soc)) soc = 0.0;

          Color stat_color = (soc < 20) ? Color(255,0,0) : (soc < 50) ? Color(255,165,0) : Color(0,255,0);
          it.printf(64, 35, id(font_huge), stat_color, TextAlign::CENTER, "%.0f%%", soc);
          if (id(bms_v).has_state()) it.printf(64, 80, id(font_large), Color(200, 200, 200), TextAlign::CENTER, "%.1f V", id(bms_v).state);
          
          it.filled_circle(14, 115, 7, Color(40, 40, 40)); 
          it.filled_circle(114, 115, 7, Color(40, 40, 40)); 
          it.filled_rectangle(14, 108, 100, 15, Color(40, 40, 40)); 
          int bar_w = (int)soc;
          if (bar_w > 0) {
            it.filled_circle(14, 115, 7, stat_color);
            it.filled_rectangle(14, 108, bar_w, 15, stat_color);
            it.filled_circle(14 + bar_w, 115, 7, stat_color);
          }

      # --- PAGE 2 (LEISTUNG) ---
      - id: page2 
        lambda: |-
          it.fill(Color(0, 0, 0));
          if (id(show_border)) it.rectangle(0,0,128,128,Color(0,0,255));
          if (id(api_server).is_connected()) it.filled_circle(115, 6, 2, Color(100, 255, 100));
          if (id(bms_ble_client).connected()) it.filled_circle(124, 6, 2, Color(0, 100, 255));

          if (id(conf_lang).current_option() == "Deutsch") {
            it.print(2, 2, id(font_small), Color(80, 80, 80), TextAlign::TOP_LEFT, "LEISTUNG");
          } else {
            it.print(2, 2, id(font_small), Color(80, 80, 80), TextAlign::TOP_LEFT, "POWER");
          }
          
          float pwr = id(bms_watt).state;
          float cur = id(bms_current).state;
          if (std::isnan(pwr)) pwr = 0.0;
          if (std::isnan(cur)) cur = 0.0;

          Color p_color = (pwr > 5) ? Color(0,255,0) : (pwr < -5) ? Color(255,50,50) : Color(150,150,150);
          Color bg_color = Color(40, 40, 40); 
          
          // KW LOGIK
          if (fabs(pwr) > 999) {
             it.printf(64, 35, id(font_huge), p_color, TextAlign::CENTER, "%.1f kW", fabs(pwr) / 1000.0);
          } else {
             it.printf(64, 35, id(font_huge), p_color, TextAlign::CENTER, "%.0f W", fabs(pwr));
          }

          if (id(bms_current).has_state()) {
            it.printf(64, 80, id(font_large), Color(200, 200, 200), TextAlign::CENTER, "%.1f A", fabs(cur));
          }
          
          it.filled_circle(14, 115, 7, bg_color); 
          it.filled_circle(114, 115, 7, bg_color); 
          it.filled_rectangle(14, 108, 100, 15, bg_color);
          
          float max_p = id(conf_max_pwr).state;
          if (max_p < 100) max_p = 100; 

          int b_w = (int)((pwr / max_p) * 50.0);
          
          if (b_w > 1) { 
            int fill = min(b_w, 50);
            it.filled_rectangle(64, 108, fill, 15, p_color); 
            it.filled_circle(64 + fill, 115, 7, p_color); 
            it.filled_rectangle(64 - 8, 108, 8, 15, bg_color);
          } 
          else if (b_w < -1) { 
            int fill = min(abs(b_w), 50);
            it.filled_rectangle(64 - fill, 108, fill, 15, p_color); 
            it.filled_circle(64 - fill, 115, 7, p_color); 
            it.filled_rectangle(64, 108, 8, 15, bg_color);
          }
          it.line(64, 106, 64, 124, Color(255,255,255));

      # --- PAGE 3 (DRIFT) ---
      - id: page3
        lambda: |-
          it.fill(Color(0, 0, 0));
          if (id(show_border)) { it.rectangle(0, 0, 128, 128, Color(0, 0, 255)); it.rectangle(1, 1, 126, 126, Color(0, 0, 255)); }
          if (id(api_server).is_connected()) it.filled_circle(115, 6, 2, Color(100, 255, 100));
          if (id(bms_ble_client).connected()) it.filled_circle(124, 6, 2, Color(0, 100, 255));

          if (id(conf_lang).current_option() == "Deutsch") {
            it.print(2, 2, id(font_small), Color(80, 80, 80), TextAlign::TOP_LEFT, "ZELL-DRIFT");
          } else {
            it.print(2, 2, id(font_small), Color(80, 80, 80), TextAlign::TOP_LEFT, "CELL-DRIFT");
          }
          
          float drift = id(bms_delta).state;
          if (std::isnan(drift)) drift = 0.0;

          Color d_color = (drift > 0.02) ? Color(255,0,0) : (drift > 0.01) ? Color(255,165,0) : Color(0,255,0);
          it.printf(64, 32, id(font_huge), d_color, TextAlign::CENTER, "%.3f", drift);
          
          if (id(bms_min_v).has_state() && id(bms_max_v).has_state()) {
            it.printf(64, 75, id(font_small), Color(200, 200, 200), TextAlign::CENTER, "%.3f - %.3f V", id(bms_min_v).state, id(bms_max_v).state);
            it.printf(64, 92, id(font_small), Color(150, 150, 150), TextAlign::CENTER, "Z%.0f <-> Z%.0f", id(bms_min_cell_num).state, id(bms_max_cell_num).state);
          }
          it.filled_circle(14, 115, 7, Color(40, 40, 40)); it.filled_circle(114, 115, 7, Color(40, 40, 40)); it.filled_rectangle(14, 108, 100, 15, Color(40, 40, 40));
          
          float max_d = id(conf_max_drift).state;
          if (max_d <= 0.001) max_d = 0.05; 
          
          int bar_d = (int)((drift / max_d) * 100.0); 
          
          if (bar_d > 0) {
            it.filled_circle(14, 115, 7, d_color);
            int width = (bar_d > 100 ? 100 : bar_d);
            it.filled_rectangle(14, 108, width, 15, d_color);
            it.filled_circle(14 + width, 115, 7, d_color);
          }

interval:
  - interval: 1s
    then:
      - lambda: |-
          // 1. BOOT LOGIK
          static int boot_cnt = 0;
          auto *active = id(lcd_display).get_active_page();
          
          if (active == id(page_boot)) {
            if (id(conf_bms_mac).state.length() >= 17) {
              boot_cnt++;
              id(boot_timer_sec) = boot_cnt; 
              if ((id(bms_soc_final).has_state() && id(bms_ble_client).connected()) || boot_cnt >= 15) {
                id(lcd_display).show_page(id(page1));
              }
            }
          }

          // 2. AUTO-CYCLE LOGIK
          int target = id(conf_page_cycle_time).state;
          if (target > 0 && active != id(page_setup) && active != id(page_boot)) {
            id(cycle_timer_counter) += 1;
            
            if (id(cycle_timer_counter) >= target) {
              id(cycle_timer_counter) = 0; // Reset
              
              if (active == id(page1)) {
                id(lcd_display).show_page(id(page2));
              } else if (active == id(page2)) {
                id(lcd_display).show_page(id(page3));
              } else if (active == id(page3)) {
                id(lcd_display).show_page(id(page1));
              }
            }
          } else {
            id(cycle_timer_counter) = 0;
          }

          // 3. SCREENSAVER LOGIK
          int timeout = id(conf_display_timeout).state;
          
          if (timeout > 0 && id(backlight_light).remote_values.is_on()) {
             id(display_timeout_counter) += 1;
             
             if (id(display_timeout_counter) >= timeout) {
                auto call = id(backlight_light).turn_off();
                call.perform();
                id(display_timeout_counter) = 0;
             }
          } else {
             id(display_timeout_counter) = 0;
          }
          
          // 4. AUTO-WAKEUP LOGIK
          int wake_target = id(conf_wake_interval).state;
          
          if (wake_target > 0 && !id(backlight_light).remote_values.is_on()) {
              id(wake_timer_counter) += 1;
              if (id(wake_timer_counter) >= wake_target) {
                  auto call = id(backlight_light).turn_on();
                  call.perform();
                  id(wake_timer_counter) = 0;
                  id(display_timeout_counter) = 0;
              }
          } else {
              id(wake_timer_counter) = 0;
          }

output:
  - platform: ledc
    pin: 16
    id: backlight_out
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_out
    name: "Display Helligkeit"
    id: backlight_light
    restore_mode: RESTORE_DEFAULT_ON

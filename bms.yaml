substitutions:
  name: "batterie-proxie"
  friendly_name: "Batterie Monitor"
  project_name: "community.jk-bms-monitor-s3"
  project_version: "1.1.0"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  compile_process_limit: 1
  
  platformio_options:
    build_flags: 
      - -Os          # Optimize for size (braucht weniger RAM beim Kompilieren)
      - -mlongcalls  # Hilft bei großen Programmen auf dem ESP32

  on_boot:
    priority: 600
    then:
      - lambda: |-
          std::string mac = id(conf_bms_mac).state;
          std::string clean_mac = "";
          for (char c : mac) {
            if (c != ' ' && c != '\n' && c != '\r') clean_mac += c;
          }
          if (clean_mac.length() >= 17) {
            uint64_t address = 0;
            int values[6];
            if (sscanf(clean_mac.c_str(), "%x:%x:%x:%x:%x:%x", &values[0], &values[1], &values[2], &values[3], &values[4], &values[5]) == 6) {
              for (int i = 0; i < 6; i++) {
                address |= (uint64_t)values[i] << (40 - i * 8);
              }
              id(bms_ble_client)->set_address(address);
            }
          }
      - light.turn_on:
          id: backlight_light
          brightness: !lambda "return id(conf_bright_high).state / 100.0f;"
      - lambda: |-
           if (id(conf_bms_mac).state.length() < 17) {
             id(lcd_display).show_page(id(page_setup));
           } else {
             id(lcd_display).show_page(id(page_boot));
           }

external_components:
  - source: github://syssi/esphome-jk-bms@main

esp32:
  board: m5stack-atoms3
  framework:
    type: arduino

# --- WIFI & WEB ---
qr_code:
  - id: wifi_qr
    value: "WIFI:S:Batterie-Setup;T:nopass;;"

wifi:
  # use_address: "192.168.178.XX" # Falls OTA zickt, hier IP eintragen
  ap:
    ssid: "Batterie-Setup"
    password: "" 
    ap_timeout: 2min

captive_portal:

web_server:
  port: 80
  version: 2

logger:
  level: WARN
  baud_rate: 0 

api:
  id: api_server 

ota:
  - platform: esphome

esp32_ble:
  max_connections: 4

esp32_ble_tracker:
  scan_parameters:
    active: true

bluetooth_proxy:
  active: true

ble_client:
  mac_address: "00:00:00:00:00:00"
  id: bms_ble_client

# --- KONFIGURATION ---
text:
  - platform: template
    name: "Konfig: BMS MAC Adresse"
    id: conf_bms_mac
    optimistic: true
    restore_value: true 
    mode: text
    entity_category: config 
    icon: "mdi:bluetooth-settings"

  - platform: template
    name: "Konfig: HA Switch 1 Entity ID"
    id: conf_ha_entity
    optimistic: true
    restore_value: true
    mode: text
    entity_category: config
    icon: "mdi:home-assistant"
    initial_value: "switch.demo_1"
  
  - platform: template
    name: "Konfig: HA Switch 2 Entity ID"
    id: conf_ha_entity_2
    optimistic: true
    restore_value: true
    mode: text
    entity_category: config
    icon: "mdi:home-assistant"
    initial_value: "switch.demo_2"

number:
  - platform: template
    name: "Display: Auto-Wechsel (Sekunden)"
    id: conf_page_cycle_time
    icon: "mdi:timer-sync"
    unit_of_measurement: "s"
    min_value: 0
    max_value: 300
    step: 1
    initial_value: 0
    optimistic: true
    restore_value: true
    entity_category: config
    on_value:
      then:
        - globals.set: { id: cycle_timer_counter, value: '0' }

  # --- NEU: TIMEOUTS & PULS ---
  - platform: template
    name: "Display: Auto-Aus Timeout (Sekunden)"
    id: conf_display_timeout
    icon: "mdi:monitor-off"
    unit_of_measurement: "s"
    min_value: 0
    max_value: 600
    step: 10
    initial_value: 60 
    optimistic: true
    restore_value: true
    entity_category: config
    on_value:
      then:
        - globals.set: { id: display_timeout_counter, value: '0' }
        - light.turn_on: backlight_light

  - platform: template
    name: "Display: Auto-An Intervall (Sekunden)"
    id: conf_wake_interval
    icon: "mdi:monitor-eye"
    unit_of_measurement: "s"
    min_value: 0
    max_value: 3600
    step: 10
    initial_value: 0
    optimistic: true
    restore_value: true
    entity_category: config
    on_value:
      then:
        - globals.set: { id: wake_timer_counter, value: '0' }

  # --- ANZEIGE KONFIG ---
  - platform: template
    name: "Anzeige: Max. Leistung (für Balken)"
    id: conf_max_pwr
    icon: "mdi:gauge"
    unit_of_measurement: "W"
    min_value: 100
    max_value: 20000
    step: 100
    initial_value: 2000
    optimistic: true
    restore_value: true
    entity_category: config

  - platform: template
    name: "Anzeige: Max. Zelldrift (für Balken)"
    id: conf_max_drift
    icon: "mdi:chart-bell-curve"
    unit_of_measurement: "V"
    min_value: 0.005
    max_value: 0.500
    step: 0.005
    initial_value: 0.050
    optimistic: true
    restore_value: true
    entity_category: config

  # --- SOC KALKULATION KONFIG ---
  - platform: template
    name: "SOC-Berechnung: Min. Spannung (0%)"
    id: conf_v_min
    icon: "mdi:battery-minus"
    unit_of_measurement: "V"
    min_value: 0
    max_value: 200
    step: 0.1
    initial_value: 24.0
    optimistic: true
    restore_value: true
    entity_category: config

  - platform: template
    name: "SOC-Berechnung: Max. Spannung (100%)"
    id: conf_v_max
    icon: "mdi:battery-plus"
    unit_of_measurement: "V"
    min_value: 0
    max_value: 200
    step: 0.1
    initial_value: 28.0
    optimistic: true
    restore_value: true
    entity_category: config

  - platform: template
    name: "Helligkeit: Stufe Hell"
    id: conf_bright_high
    unit_of_measurement: "%"
    min_value: 10
    max_value: 100
    step: 1
    initial_value: 100
    optimistic: true
    restore_value: true
    entity_category: config
    icon: "mdi:brightness-7"

  - platform: template
    name: "Helligkeit: Stufe Gedimmt"
    id: conf_bright_low
    unit_of_measurement: "%"
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 70
    optimistic: true
    restore_value: true
    entity_category: config
    icon: "mdi:brightness-4"

select:
  - platform: template
    name: "Konfig: SOC Quelle"
    id: conf_soc_source
    optimistic: true
    options: ["BMS SOC", "Spannung Kalkuliert"]
    initial_option: "BMS SOC"
    restore_value: true
    entity_category: config
    icon: "mdi:battery-settings"

  - platform: template
    name: "Konfig: Sprache"
    id: conf_lang
    optimistic: true
    options: ["Deutsch", "English"]
    initial_option: "Deutsch"
    restore_value: true 
    entity_category: config
    icon: "mdi:translate"

  - platform: template
    name: "Button: Einzelklick"
    id: btn_action_single
    optimistic: true
    restore_value: true
    options: ["Nichts", "Nächste Seite", "Helligkeit ändern", "HA Switch 1 umschalten", "HA Switch 2 umschalten"]
    initial_option: "Nächste Seite"
    entity_category: config
    icon: "mdi:gesture-tap"

  - platform: template
    name: "Button: Doppelklick"
    id: btn_action_double
    optimistic: true
    restore_value: true
    options: ["Nichts", "Nächste Seite", "Helligkeit ändern", "HA Switch 1 umschalten", "HA Switch 2 umschalten"]
    initial_option: "Helligkeit ändern" 
    entity_category: config
    icon: "mdi:gesture-double-tap"

  - platform: template
    name: "Button: Lang Drücken"
    id: btn_action_long
    optimistic: true
    restore_value: true
    options: ["Nichts", "Nächste Seite", "Helligkeit ändern", "HA Switch 1 umschalten", "HA Switch 2 umschalten"]
    initial_option: "Helligkeit ändern"
    entity_category: config
    icon: "mdi:gesture-tap-hold"

switch:
  - platform: restart
    name: "Gerät neu starten"
    entity_category: config
    icon: "mdi:restart"

  - platform: jk_bms_ble
    jk_bms_ble_id: bms0
    charging: { name: "BMS Laden", id: bms_laden_switch }
    discharging: { name: "BMS Entladen", id: bms_entladen_switch }
    balancer: { name: "BMS Balancer", id: bms_balancer_switch }
    disable_pcl_module: { name: "BMS PCL", id: bms_pcl_switch }

globals:
  - id: show_border
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: boot_timer_sec
    type: int
    initial_value: '0' 
  - id: cycle_timer_counter
    type: int
    initial_value: '0'
  - id: display_timeout_counter
    type: int
    initial_value: '0'
  - id: wake_timer_counter
    type: int
    initial_value: '0'

# --- LOGIK SCRIPT ---
script:
  - id: flash_border
    mode: restart
    then:
      - globals.set: { id: show_border, value: 'true' }
      - component.update: lcd_display
      - delay: 200ms
      - globals.set: { id: show_border, value: 'false' }
      - component.update: lcd_display
      
  - id: execute_button_action
    parameters:
      selection: string
    then:
      # --- WAKE UP LOGIK ---
      - if:
          condition:
            light.is_off: backlight_light
          then:
            - light.turn_on: backlight_light
            - globals.set: { id: display_timeout_counter, value: '0' }
            - globals.set: { id: wake_timer_counter, value: '0' } 
            - script.stop: execute_button_action 
      
      # --- NORMALE AKTION ---
      - script.execute: flash_border
      - globals.set: { id: cycle_timer_counter, value: '0' }
      - globals.set: { id: display_timeout_counter, value: '0' }
      - globals.set: { id: wake_timer_counter, value: '0' }
      
      - lambda: |-
          if (selection == "Nächste Seite") {
            auto *active = id(lcd_display).get_active_page();
            if (active == id(page_boot) || active == id(page3) || active == id(page_setup)) {
               id(lcd_display).show_page(id(page1));
            } else {
               id(lcd_display).show_next_page();
            }
          }
          else if (selection == "Helligkeit ändern") {
             float val_high = id(conf_bright_high).state / 100.0f;
             float val_low = id(conf_bright_low).state / 100.0f;
             float current = id(backlight_light).remote_values.get_brightness();
             auto call = id(backlight_light).turn_on();
             
             if (current >= (val_high - 0.05f)) {
                call.set_brightness(val_low);
             } else {
                call.set_brightness(val_high);
             }
             call.perform();
          }

      # Logik für Home Assistant Switch 1
      - if:
          condition:
            lambda: 'return selection == "HA Switch 1 umschalten";'
          then:
            - homeassistant.service:
                service: switch.toggle
                data:
                  entity_id: !lambda 'return id(conf_ha_entity).state;'

      # Logik für Home Assistant Switch 2
      - if:
          condition:
            lambda: 'return selection == "HA Switch 2 umschalten";'
          then:
            - homeassistant.service:
                service: switch.toggle
                data:
                  entity_id: !lambda 'return id(conf_ha_entity_2).state;'

